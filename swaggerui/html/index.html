<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="SwaggerUI" />
  <title>SwaggerUI</title>
  <link rel="icon" type="image/png" href="./favicon-32x32.png" sizes="32x32" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.31.0/swagger-ui.css"
    integrity="sha512-franxM1vSpi8w0Ni4gQdyju6H2ZQLfVbHG48n4AU2icB8yTJ/WgBl9pxo9IcXjgKNlt+p7N1pdDER9P6ayGepA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.31.0/swagger-ui-bundle.js"
    integrity="sha512-6WkepU6FmMMNE0LmwyAaYhXIE4VZ12qm8HrOOqzTiK0SJqoTqhdsTENV+Eq5bx3AGhYvN117cvHBDbTWQU1lYg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.31.0/swagger-ui-standalone-preset.js"
    integrity="sha512-xlHi4BuPfAt2afGWeeIII/NlKlDRcQJH3OOKMjifEdh4UGnwOKWxOgTpNEYu390fURlsMK6uSJrEsuuoWx0Vtw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: "./swagger.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
      });
    };
  </script>
</body>

</html>
